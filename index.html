<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness & Macro Tracker</title>
    <style>
        :root {
            --bg-dark: #0B1120;
            --surface: #1E293B;
            --primary: #0EA5E9; /* Lush Neon Blue */
            --primary-hover: #38BDF8;
            --text-light: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        /* Header Span */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--surface);
            padding-bottom: 1rem;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--primary);
        }

        .header-stats {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* Cards & Containers */
        .card {
            background-color: var(--surface);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--text-light);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        /* KPI Specific */
        .kpi {
            text-align: center;
        }
        .kpi-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        input, select {
            background-color: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            padding: 0.8rem;
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 0.8rem;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            color: var(--text-muted);
            font-weight: normal;
        }

        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 0.3rem 0.6rem;
            width: auto;
        }
        
        .btn-delete:hover {
            background-color: var(--danger);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>Fitness & Macro Tracker</h1>
            <div class="header-stats">
                Target: Cut | User: Admin | BMR: <strong style="color: #fff;">1850 kcal</strong>
            </div>
        </div>

        <div class="col-left">
            <div class="card kpi">
                <h2>Today's Net Deficit</h2>
                <div class="kpi-value">-350 kcal</div>
                <small style="color: var(--text-muted);">Goal: -500 kcal</small>
            </div>

            <div class="card">
                <h2>Log a Meal</h2>
                <form id="mealForm">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="mealDate" required>
                    </div>
                    <div class="form-group">
                        <label>Food Item</label>
                        <input type="text" id="foodItem" placeholder="e.g., Grilled Chicken Rice" required>
                    </div>
                    <div class="form-group">
                        <label>Calories</label>
                        <input type="number" id="mealCals" placeholder="450" required>
                    </div>
                    <button type="submit">Add Meal</button>
                </form>
            </div>

            <div class="card">
                <h2>Log a Workout</h2>
                <form id="workoutForm">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="workoutDate" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="workoutType">
                            <option>PPL (Push/Pull/Legs)</option>
                            <option>HIIT</option>
                            <option>Cardio (LISS)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Calories Burned</label>
                        <input type="number" id="workoutCals" placeholder="300" required>
                    </div>
                    <button type="submit">Add Workout</button>
                </form>
            </div>
        </div>

        <div class="col-right">
            <div class="card">
                <h2>Recent Meals</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Item</th>
                            <th>Calories</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="mealTableBody">
                        <tr>
                            <td>2026-04-06</td>
                            <td>Oatmeal & Protein</td>
                            <td>420</td>
                            <td><button class="btn-delete">X</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>Recent Workouts</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Burned</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="workoutTableBody">
                        <tr>
                            <td>2026-04-06</td>
                            <td>PPL (Push/Pull/Legs)</td>
                            <td>380</td>
                            <td><button class="btn-delete">X</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Example of how you will intercept the form and send data to your database
        document.getElementById('mealForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page refresh
            
            const payload = {
                date: document.getElementById('mealDate').value,
                food: document.getElementById('foodItem').value,
                calories: document.getElementById('mealCals').value
            };

            console.log("Sending to Database:", payload);
            alert("Meal ready to be inserted! Check console.");
            
            /* FUTURE VERCEL API CALL:
            fetch('/api/add-meal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            */
            this.reset();
        });
    </script>
</body>
</html>
