<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness & Macro Tracker</title>
    <style>
        :root {
            --bg-dark: #0B1120;
            --surface: #1E293B;
            --primary: #0EA5E9;
            --primary-hover: #38BDF8;
            --text-light: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --success: #10B981;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--surface);
            padding-bottom: 1rem;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--primary);
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .card {
            background-color: var(--surface);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--text-light);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        .kpi {
            text-align: center;
        }
        .kpi-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .form-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        input, select {
            background-color: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            padding: 0.7rem;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 0.8rem;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            color: var(--text-muted);
            font-weight: normal;
            font-size: 0.85rem;
        }

        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 0.2rem 0.5rem;
            width: auto;
            margin-top: 0;
        }
        
        .btn-delete:hover {
            background-color: var(--danger);
            color: #fff;
        }

        .stats-strip {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .stats-strip strong { color: #fff; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div>
                <h1>Fitness & Macro Tracker</h1>
                <div class="stats-strip">
                    <span>Goal: <strong id="displayGoal">---</strong></span>
                    <span>BMR: <strong id="displayBMR">---</strong></span>
                    <span>Target: <strong id="displayTarget" style="color: var(--primary);">---</strong></span>
                </div>
            </div>
            <div class="user-controls">
                <label style="margin-bottom: 0;">Profile:</label>
                <select id="userSelector" style="padding: 0.4rem;"></select>
            </div>
        </div>

        <div class="col-left">
            <div class="card kpi">
                <h2>Daily Status</h2>
                <div id="netDeficitDisplay" class="kpi-value">0 kcal</div>
                <small id="netStatusLabel" style="color: var(--text-muted);">Calculating...</small>
            </div>

            <div class="card">
                <h2>Profile & Biometrics</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="username" placeholder="Haseeb" required>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>Age</label>
                            <input type="number" id="userAge" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Gender</label>
                            <select id="userGender">
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>Weight (kg)</label>
                            <input type="number" step="0.1" id="userWeight" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Height (cm)</label>
                            <input type="number" step="0.1" id="userHeight" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Current Goal</label>
                        <select id="userGoal">
                            <option value="Cut">Cut (-500 kcal)</option>
                            <option value="Maintain">Maintain</option>
                            <option value="Bulk">+500 kcal)</option>
                        </select>
                    </div>
                    <div class="form-group" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                        <label>Manual Calorie Target (Optional Override)</label>
                        <input type="number" id="manualTarget" placeholder="Leave empty to auto-calculate">
                    </div>
                    <button type="submit">Save Changes</button>
                    <button type="button" id="btnNewUser" style="background: transparent; color: var(--text-muted); border: 1px solid var(--surface); margin-top: 0.5rem;">Create New Profile</button>
                </form>
            </div>

            <div class="card">
                <h2>Log a Meal</h2>
                <form id="mealForm">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="mealDate" required>
                    </div>
                    <div class="form-group">
                        <label>Food Item</label>
                        <input type="text" id="foodItem" placeholder="e.g., Chicken Rice" required>
                    </div>
                    <div class="form-group">
                        <label>Total Calories</label>
                        <input type="number" id="mealCals" required>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>P (g)</label>
                            <input type="number" id="mealProtein" value="0">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>C (g)</label>
                            <input type="number" id="mealCarbs" value="0">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>F (g)</label>
                            <input type="number" id="mealFats" value="0">
                        </div>
                    </div>
                    <button type="submit">Add Meal</button>
                </form>
            </div>

            <div class="card">
                <h2>Log a Workout</h2>
                <form id="workoutForm">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="workoutDate" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="workoutCategory">
                            <option>PPL - Push</option>
                            <option>PPL - Pull</option>
                            <option>PPL - Legs</option>
                            <option>HIIT</option>
                            <option>LISS Cardio</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>Mins</label>
                            <input type="number" id="workoutDuration" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Burned</label>
                            <input type="number" id="workoutCals" required>
                        </div>
                    </div>
                    <button type="submit">Add Workout</button>
                </form>
            </div>
        </div>

        <div class="col-right">
            <div class="card">
                <h2>Recent Intake</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Item</th>
                            <th>Kcal</th>
                            <th>Macros</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="mealTableBody"></tbody>
                </table>
            </div>

            <div class="card">
                <h2>Recent Activity</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Time</th>
                            <th>Burned</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="workoutTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('mealDate').value = today;
        document.getElementById('workoutDate').value = today;

        let currentUserId = localStorage.getItem('selectedUserId') || '1';
        let userStats = { bmr: 0, target: 0, goal: 'Maintain' };
        let dailyTotals = { consumed: 0, burned: 0 };

        function updateNetDeficit() {
            const net = dailyTotals.consumed - dailyTotals.burned;
            const status = net - userStats.target;
            const display = document.getElementById('netDeficitDisplay');
            const label = document.getElementById('netStatusLabel');
            
            display.innerText = `${Math.abs(status)} kcal`;
            if (status <= 0) {
                display.style.color = 'var(--success)';
                label.innerText = 'Remaining Daily Budget';
            } else {
                display.style.color = 'var(--danger)';
                label.innerText = 'Over Daily Target';
            }
        }

        // --- FETCH ALL USERS ---
        function loadUserList() {
            fetch('/api/get_users')
            .then(res => res.json())
            .then(data => {
                const selector = document.getElementById('userSelector');
                selector.innerHTML = '';
                data.data.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.UserID;
                    opt.innerText = u.Username;
                    if (u.UserID == currentUserId) opt.selected = true;
                    selector.appendChild(opt);
                });
            });
        }

        document.getElementById('userSelector').addEventListener('change', (e) => {
            currentUserId = e.target.value;
            localStorage.setItem('selectedUserId', currentUserId);
            loadDashboardData();
        });

        document.getElementById('btnNewUser').addEventListener('click', () => {
            currentUserId = null;
            document.getElementById('profileForm').reset();
            document.getElementById('username').focus();
            alert("Enter details for new profile and click 'Save Changes'");
        });

        // --- PROFILE SUBMISSION ---
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const age = parseInt(document.getElementById('userAge').value);
            const weight = parseFloat(document.getElementById('userWeight').value);
            const height = parseFloat(document.getElementById('userHeight').value);
            const gender = document.getElementById('userGender').value;
            const goal = document.getElementById('userGoal').value;
            const manualTarget = document.getElementById('manualTarget').value;

            let bmr = Math.round((10 * weight) + (6.25 * height) - (5 * age) + (gender === 'M' ? 5 : -161));
            let targetCalories = manualTarget ? parseInt(manualTarget) : Math.round(bmr * 1.2 + (goal === 'Cut' ? -500 : goal === 'Bulk' ? 500 : 0));

            const payload = { 
                user_id: currentUserId,
                username: document.getElementById('username').value,
                age, weight, height, gender, goal, bmr, 
                target_calories: targetCalories 
            };

            fetch('/api/add_user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                loadUserList();
                loadDashboardData();
            });
        });

        // --- DATA LOGGING ---
        document.getElementById('mealForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const payload = {
                user_id: currentUserId,
                date: document.getElementById('mealDate').value,
                food: document.getElementById('foodItem').value,
                calories: document.getElementById('mealCals').value,
                protein: document.getElementById('mealProtein').value,
                carbs: document.getElementById('mealCarbs').value,
                fats: document.getElementById('mealFats').value
            };
            fetch('/api/add_meal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => { e.target.reset(); document.getElementById('mealDate').value = today; loadDashboardData(); });
        });

        document.getElementById('workoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const payload = {
                user_id: currentUserId,
                date: document.getElementById('workoutDate').value,
                category: document.getElementById('workoutCategory').value,
                duration: document.getElementById('workoutDuration').value,
                calories: document.getElementById('workoutCals').value
            };
            fetch('/api/add_workout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => { e.target.reset(); document.getElementById('workoutDate').value = today; loadDashboardData(); });
        });

        // --- DASHBOARD REFRESH ---
        function loadDashboardData() {
            if (!currentUserId) return;
            
            fetch(`/api/get_user?user_id=${currentUserId}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    const u = data.data;
                    userStats = { bmr: u.CalculatedBMR, target: u.TargetCalories, goal: u.FitnessGoal };
                    document.getElementById('displayGoal').innerText = u.FitnessGoal;
                    document.getElementById('displayBMR').innerText = u.CalculatedBMR + " kcal";
                    document.getElementById('displayTarget').innerText = u.TargetCalories + " kcal";
                    
                    document.getElementById('username').value = u.Username;
                    document.getElementById('userAge').value = u.Age;
                    document.getElementById('userWeight').value = u.WeightKG;
                    document.getElementById('userHeight').value = u.HeightCM;
                    document.getElementById('userGender').value = u.Gender;
                    document.getElementById('userGoal').value = u.FitnessGoal;
                    document.getElementById('manualTarget').value = u.TargetCalories;
                }
            });

            fetch(`/api/get_meals?user_id=${currentUserId}`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('mealTableBody');
                tbody.innerHTML = '';
                dailyTotals.consumed = 0;
                data.data.forEach(m => {
                    if (m.LogDate === today) dailyTotals.consumed += m.Calories;
                    tbody.innerHTML += `<tr><td>${m.LogDate}</td><td>${m.FoodItem}</td><td>${m.Calories}</td><td>${m.ProteinGrams}/${m.CarbsGrams}/${m.FatsGrams}</td><td><button class="btn-delete">X</button></td></tr>`;
                });
                updateNetDeficit();
            });

            fetch(`/api/get_workouts?user_id=${currentUserId}`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('workoutTableBody');
                tbody.innerHTML = '';
                dailyTotals.burned = 0;
                data.data.forEach(w => {
                    if (w.LogDate === today) dailyTotals.burned += w.CaloriesBurned;
                    tbody.innerHTML += `<tr><td>${w.LogDate}</td><td>${w.WorkoutCategory}</td><td>${w.DurationMinutes}m</td><td>${w.CaloriesBurned}</td><td><button class="btn-delete">X</button></td></tr>`;
                });
                updateNetDeficit();
            });
        }

        window.onload = () => { loadUserList(); loadDashboardData(); };
    </script>
</body>
</html>
